specVersion: 0.0.5
schema:
  file: ./schema.graphql
features:
  - grafting
dataSources:
  - kind: ethereum
    name: ZeroXDex
    network: liteforge
    source:
      address: "0x873cb0402F0e74Db66663255e6B3535ca134C818"
      abi: ZeroXDex
      startBlock: 24869425
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mapping.ts
      entities:
        - Swap
        - Candle
        - Pool
        - LiquidityAdded
        - LiquidityRemoved
        - PoolCreated
        - RewardClaimed
      abis:
        - name: ZeroXDex
          file: ./abis/ZeroXDex.json
      eventHandlers:
        - event: Swapped(indexed address,indexed address,indexed address,uint256,uint256,uint256)
          handler: handleSwapped
        - event: LiquidityAdded(indexed address,indexed bytes32,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,indexed bytes32,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: PoolCreated(indexed bytes32,address,address,address)
          handler: handlePoolCreated
        - event: RewardClaimed(indexed address,uint256)
          handler: handleRewardClaimed

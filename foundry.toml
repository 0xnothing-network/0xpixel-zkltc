[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache = true
cache_path = "cache"

# Solidity compiler settings — match LitVM (EVM Version: Shanghai)
solc = "0.8.34"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200

# LitVM testnet (Caldera) — chain id 4441, gas token zkLTC
[rpc_endpoints]
litvm_testnet = "https://liteforge.rpc.caldera.xyz/http"
litvm_mainnet = "${LITVM_MAINNET_RPC_URL}"

# Block explorer for contract verification
[etherscan]
litvm_testnet = {key = "${LITVM_EXPLORER_API_KEY}", url = "https://liteforge.explorer.caldera.xyz/api", chain = 4441}

# Remappings so `import "@openzeppelin/contracts/..."` works
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

# Use via-ir to reduce deployment cost for large contracts
via_ir = false

# Format settings
fmt = { line_length = 120, tab_width = 4, bracket_spacing = false, int_types = "long", quote_style = "double" }

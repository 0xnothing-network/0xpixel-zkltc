specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PixelNFT
    network: liteforge
    source:
      address: "0x33A32b9b2BEe864f9e42BFa39cA7BDC72f655988"
      abi: PixelNFT
      startBlock: 24867130
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mapping.ts
      entities:
        - Token
        - Account
        - TransferEvent
        - MarketplaceStats
      abis:
        - name: PixelNFT
          file: ./abis/PixelNFT.json
      eventHandlers:
        - event: Minted(indexed address,indexed uint256,string)
          handler: handleMinted
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
  - kind: ethereum
    name: Marketplace
    network: liteforge
    source:
      address: "0x13337cadA78d53C90E3c0EcE44C17c467C1a86F4"
      abi: Marketplace
      startBlock: 24867505
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mapping.ts
      entities:
        - Listing
        - Token
        - Account
        - MarketEvent
        - MarketplaceStats
      abis:
        - name: Marketplace
          file: ./abis/Marketplace.json
        - name: PixelNFT
          file: ./abis/PixelNFT.json
      eventHandlers:
        - event: Listed(indexed uint256,indexed address,uint256,address,uint256)
          handler: handleListed
        - event: Bought(indexed uint256,address,uint256)
          handler: handleBought
        - event: ListingCancelled(indexed uint256)
          handler: handleListingCancelled

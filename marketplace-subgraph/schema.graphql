type Account @entity {
  id: ID!
  tokens: [Token!]! @derivedFrom(field: "ownerAccount")
  createdTokens: [Token!]! @derivedFrom(field: "creatorAccount")
  listings: [Listing!]! @derivedFrom(field: "sellerAccount")
  boughtListings: [Listing!]! @derivedFrom(field: "buyerAccount")
  tokenCount: BigInt!
  listingCount: BigInt!
  activeListingCount: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Token @entity {
  id: ID!
  tokenId: BigInt! @index
  collection: Bytes! @index
  owner: Bytes! @index
  ownerAccount: Account
  creator: Bytes! @index
  creatorAccount: Account
  name: String!
  gridSize: BigInt
  pixelData: String
  artworkHash: Bytes
  mintedAt: BigInt!
  mintedBlock: BigInt!
  mintedTx: Bytes!
  listing: Listing
  activeListing: Listing
  transferCount: BigInt!
  updatedAt: BigInt!
}

type Listing @entity {
  id: ID!
  listingId: BigInt! @index
  collection: Bytes! @index
  token: Token
  tokenId: BigInt! @index
  seller: Bytes! @index
  sellerAccount: Account
  buyer: Bytes
  buyerAccount: Account
  price: BigInt!
  active: Boolean! @index
  status: ListingStatus! @index
  listedAt: BigInt! @index
  listedBlock: BigInt!
  listedTx: Bytes!
  soldAt: BigInt
  soldBlock: BigInt
  soldTx: Bytes
  cancelledAt: BigInt
  cancelledBlock: BigInt
  cancelledTx: Bytes
  updatedAt: BigInt!
}

type TransferEvent @entity {
  id: ID!
  token: Token
  collection: Bytes! @index
  tokenId: BigInt! @index
  from: Bytes! @index
  to: Bytes! @index
  timestamp: BigInt! @index
  blockNumber: BigInt!
  txHash: Bytes!
}

type MarketEvent @entity {
  id: ID!
  listing: Listing
  listingId: BigInt! @index
  collection: Bytes
  tokenId: BigInt
  seller: Bytes
  buyer: Bytes
  price: BigInt
  eventType: MarketEventType! @index
  timestamp: BigInt! @index
  blockNumber: BigInt!
  txHash: Bytes!
}

type MarketplaceStats @entity {
  id: ID!
  totalTokens: BigInt!
  totalListings: BigInt!
  activeListings: BigInt!
  totalSales: BigInt!
  totalVolume: BigInt!
  updatedAt: BigInt!
}

enum ListingStatus {
  ACTIVE
  SOLD
  CANCELLED
}

enum MarketEventType {
  LISTED
  BOUGHT
  CANCELLED
}
